<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transit Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="d-flex flex-column min-vh-100" style="background-image: 
                        url('img/bg.jpeg'); 
                        background-size: cover; 
                        background-position: center;">
      <div class="d-flex flex-grow-1 justify-content-center align-items-center p-3">
        <div class="row w-100">
            <div class="col text-center">
                <h1 class="p-3 mb-2 bg-dark text-white">Transit-Typing</h1>
                <textarea name="textarea" id="textarea" rows="20" spellcheck="false" autofocus></textarea>
                <div class="alert alert-success" id="warning">
                  Keine doppelten Wörter!
                </div>
                <button type="button" class="btn btn-dark">
                  Wordcount<span class="badge badge-light" id="wordcount"></span>
                </button>
            </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script type="text/javascript" src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
